<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 820" role="img" aria-label="Cinematic animated hero reel">
  <defs>
    <linearGradient id="skyA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#090909"/>
      <stop offset=".32" stop-color="#183536"/>
      <stop offset=".66" stop-color="#8b2f35"/>
      <stop offset="1" stop-color="#d0a35e"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" x2="1">
      <stop offset="0" stop-color="#fff7d5" stop-opacity="0"/>
      <stop offset=".5" stop-color="#fff7d5" stop-opacity=".75"/>
      <stop offset="1" stop-color="#fff7d5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="1">
      <stop offset="0" stop-color="#fff2be"/>
      <stop offset=".48" stop-color="#7d9695"/>
      <stop offset="1" stop-color="#1a2020"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="2" seed="9"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .14"/>
      </feComponentTransfer>
    </filter>
    <mask id="wide">
      <rect width="1920" height="820" fill="#fff"/>
      <rect width="1920" height="88" y="0" fill="#000"/>
      <rect width="1920" height="88" y="732" fill="#000"/>
    </mask>
  </defs>

  <rect width="1920" height="820" fill="#050505"/>
