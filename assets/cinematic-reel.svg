    <rect width="1920" height="820" filter="url(#grain)" opacity=".32"/>
    <rect y="0" width="1920" height="88" fill="#030303"/>
    <rect y="732" width="1920" height="88" fill="#030303"/>
    <text x="118" y="695" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#fff4cd" opacity=".92">CINEMATIC HERO REEL</text>
    <text x="118" y="746" font-family="'Microsoft YaHei', sans-serif" font-size="24" fill="#f6e8ce" opacity=".72">星河、长城、月光与战鼓，在同一条命运线上醒来。</text>
    <g transform="translate(1492 665)">
